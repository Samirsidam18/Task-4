<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>✨ My To-Do List</h2>

  <div class="stats">
    <span>Total: <b id="total">0</b></span>
    <span>Active: <b id="active">0</b></span>
    <span>Completed: <b id="completed">0</b></span>
  </div>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="What needs to be done?">
    <button onclick="addTask()">Add Task</button>
  </div>

  <div class="filters">
    <button onclick="setFilter('all')" class="active">All</button>
    <button onclick="setFilter('active')">Active</button>
    <button onclick="setFilter('completed')">Completed</button>
  </div>

  <ul id="taskList"></ul>

  <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>

</div>

<script src="script.js"></script>
</body>
</html>
